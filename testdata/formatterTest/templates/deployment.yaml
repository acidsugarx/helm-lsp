apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "formatterTest.fullname" . }}
  labels:
    {{- include "formatterTest.labels" . | nindent 4 }}
spec:
    replicas: {{ .Values.replicaCount }}
    selector:
      matchLabels:
        {{- include "formatterTest.selectorLabels" . | nindent 6 }}
template:
  metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "formatterTest.selectorLabels" . | nindent 8 }}
  spec:
        serviceAccountName: {{ include "formatterTest.serviceAccountName" . }}
        securityContext:
          {{- toYaml .Values.podSecurityContext | nindent 8 }}
        containers:
          - name: {{ .Chart.Name }}
            securityContext:
              {{- toYaml .Values.securityContext | nindent 12 }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
            protocol: TCP
