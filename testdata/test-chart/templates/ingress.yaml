---
# =============================================
# TEST — Code Actions INSIDE range/with blocks
# =============================================
# Тут Extract должен использовать $.Values вместо .Values
# =============================================

{{- range $name, $ing := .Values.ingresses }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  annotations:
    # ✅ CODE ACTION: Extract INSIDE RANGE → $.Values (не .Values!)
    kubernetes.io/ingress.class: nginx
    # ✅ CODE ACTION: ещё один Extract inside range
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: {{ $ing.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                # ✅ CODE ACTION: Extract inside range
                port: 80
{{- end }}

---
# =============================================
# TEST — Code Actions INSIDE with block
# =============================================

{{- with .Values.resources }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-info
data:
  # ✅ CODE ACTION: Extract INSIDE WITH → $.Values (не .Values!)
  maxCpu: 500m
  # ✅ CODE ACTION: ещё один Extract inside with
  maxMemory: 256Mi
{{- end }}

---
# =============================================
# TEST — NESTED range inside with
# =============================================

{{- with .Values.ingresses }}
  {{- range $name, $ing := . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
data:
  # ✅ CODE ACTION: Extract DOUBLE NESTED (with + range) → $.Values
  defaultTimeout: 30s
  # ✅ CODE ACTION: "Add | quote" — $.Values без quote
  host: {{ $.Values.service.type }}
  {{- end }}
{{- end }}
