---
# =============================================
# TEST — INSIDE range block
# =============================================

{{- range $name, $ing := .Values.ingresses }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  annotations:
    # ✅ EXTRACT inside RANGE → $.Values... (annotation key with dots/slashes)
    kubernetes.io/ingress.class: nginx
    # ✅ EXTRACT inside RANGE
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: {{ $ing.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # ✅ EXTRACT inside RANGE
                port: 80
{{- end }}

---
# =============================================
# TEST — INSIDE with block
# =============================================

{{- with .Values.resources }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-info
data:
  # ✅ EXTRACT inside WITH → $.Values...
  maxCpu: 500m
  # ✅ EXTRACT inside WITH
  maxMemory: 256Mi
{{- end }}

---
# =============================================
# TEST — NESTED: with + range
# =============================================

{{- with .Values.ingresses }}
  {{- range $name, $ing := . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
data:
  # ✅ EXTRACT DOUBLE NESTED → $.Values...
  defaultTimeout: 30s
  # ✅ "Add | quote" — $.Values без quote
  host: {{ $.Values.service.type }}
  {{- end }}
{{- end }}
