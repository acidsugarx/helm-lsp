---
# =============================================
# TEST CHART — Code Actions Playground
# =============================================
# Поставь курсор на строку ПОД комментарием → <leader>la
# =============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    # ✅ CODE ACTION: "indent → nindent"
    {{- include "test-chart.labels" . | indent 4 }}
spec:
  # ✅ EXTRACT → .Values.replicas
  replicas: 3
  # ✅ EXTRACT → .Values.minReadySeconds
  minReadySeconds: 10
  selector:
    matchLabels:
      app: my-app
  template:
    spec:
      # ✅ EXTRACT → .Values.terminationGracePeriodSeconds
      terminationGracePeriodSeconds: 30
      containers:
        - name: nginx
          image: nginx:1.25
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            # ✅ CODE ACTION: "toYaml без nindent"
            {{- toYaml .Values.resources }}
          env:
            # 1. Standard name first, value second
            - name: APP_ENV
              value: production
            # 2. Value first, name second
            - value: "true"
              name: DEBUG_MODE
            # 3. Templated name
            - name: {{ .Values.logLevel | default "LOG_LEVEL" }}
              value: info
            # 4. Another standard one to ensure no bleeding
            - name: DATABASE_URL
              value: postgres://...
