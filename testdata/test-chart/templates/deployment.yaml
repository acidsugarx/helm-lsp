---
# =============================================
# TEST CHART — Code Actions Playground
# =============================================
# Поставь курсор на строку ПОД комментарием → <leader>la
# =============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    # ✅ CODE ACTION: "indent → nindent"
    {{- include "test-chart.labels" . | indent 4 }}
spec:
  # ✅ EXTRACT → .Values.replicas
  replicas: 3
  # ✅ EXTRACT → .Values.minReadySeconds
  minReadySeconds: 10
  selector:
    matchLabels:
      app: my-app
  template:
    spec:
      # ✅ EXTRACT → .Values.terminationGracePeriodSeconds
      terminationGracePeriodSeconds: 30
      containers:
        - image: nginx:1.25
          name: nginx
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            # ✅ CODE ACTION: "toYaml без nindent"
            {{- toYaml .Values.resources }}
          env:
            - name: {{ .Values.logLevel | default "APP_ENV" }}
              # ✅ EXTRACT → .Values.value (under env)
              value: production
            - name: {{ .Values.{{.values.loglevel|Default"appEnv"}} | default "LOG_LEVEL" }}
              # ✅ EXTRACT
              value: info
