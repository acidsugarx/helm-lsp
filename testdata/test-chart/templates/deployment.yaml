---
# =============================================
# TEST CHART — Code Actions Playground
# =============================================
# Поставь курсор на строку ПОД комментарием → <leader>la
# =============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    # ✅ CODE ACTION: "indent → nindent"
    {{- include "test-chart.labels" . | indent 4 }}
spec:
  # ✅ EXTRACT → .Values.replicas
  replicas: 3
  # ✅ EXTRACT → .Values.minReadySeconds
  minReadySeconds: 10
  selector:
    matchLabels:
      app: my-app
  template:
    spec:
      # ✅ EXTRACT → .Values.terminationGracePeriodSeconds
      terminationGracePeriodSeconds: 30
      containers:
        # --- TEST 1: Hardcoded container ---
        - name: nginx
          image: nginx:1.25
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            {{- toYaml .Values.resources }}
          env:
            - name: APP_ENV
              value: production
            - value: "true"
              name: DEBUG_MODE
            - name: {{ .Values.logLevel | default "LOG_LEVEL" }}
              value: info
            - name: DATABASE_URL
              value: postgres://...
              
        # --- TEST 2: Range container ---
        {{- range $name, $c := .Values.extraContainers }}
        - name: {{ $c.name | default "extra" }}
          image: busybox:1.36
          env:
            - name: MY_SECRET
              value: super-secret
        {{- end }}
