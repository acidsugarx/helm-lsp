apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: crontabs.stable.example.com
spec:
  group: stable.example.com
  names:
    kind: CronTab
  versions:
    - name: v1
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: "The specific configuration for the CronTab"
              properties:
                cronSpec:
                  type: string
                  description: "The cron schedule, e.g. * * * * *"
                image:
                  type: string
                  description: "The container image to run"
                replicas:
                  type: integer
                  description: "Number of replicas"
            status:
              type: object
              description: "The current status of the CronTab"
              properties:
                running:
                  type: boolean
                  description: "Whether the job is currently running"
