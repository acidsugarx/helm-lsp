version: 2

project_name: helm-lsp

builds:
  - id: darwin-amd64
    main: ./cmd/helm-lsp
    binary: helm-lsp
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/acidsugarx/helm-lsp/internal/version.version={{ .Version }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitCommit={{ .Commit }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitTreeState=clean

  - id: darwin-arm64
    main: ./cmd/helm-lsp
    binary: helm-lsp
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/acidsugarx/helm-lsp/internal/version.version={{ .Version }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitCommit={{ .Commit }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitTreeState=clean

  - id: linux-amd64
    main: ./cmd/helm-lsp
    binary: helm-lsp
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/acidsugarx/helm-lsp/internal/version.version={{ .Version }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitCommit={{ .Commit }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitTreeState=clean

  - id: linux-arm64
    main: ./cmd/helm-lsp
    binary: helm-lsp
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/acidsugarx/helm-lsp/internal/version.version={{ .Version }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitCommit={{ .Commit }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitTreeState=clean

  - id: windows-amd64
    main: ./cmd/helm-lsp
    binary: helm-lsp
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    flags:
      - -trimpath
      - -buildmode=exe
    ldflags:
      - -s -w
      - -X github.com/acidsugarx/helm-lsp/internal/version.version={{ .Version }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitCommit={{ .Commit }}
      - -X github.com/acidsugarx/helm-lsp/internal/version.gitTreeState=clean

archives:
  - id: release-archives
    ids:
      - darwin-amd64
      - darwin-arm64
      - linux-amd64
      - linux-arm64
      - windows-amd64
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  name_template: "{{ .Tag }}"
